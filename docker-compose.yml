services:
  frontend:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
        NEXT_PUBLIC_API_MODE: ${NEXT_PUBLIC_API_MODE:-real}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
        NEXT_PUBLIC_DEFAULT_LOCALE: ${NEXT_PUBLIC_DEFAULT_LOCALE:-ru}
        NEXT_PUBLIC_SUPPORTED_LOCALES: ${NEXT_PUBLIC_SUPPORTED_LOCALES:-ru,kk}
        NEXT_PUBLIC_ENABLE_WISHLIST: ${NEXT_PUBLIC_ENABLE_WISHLIST:-false}
        NEXT_PUBLIC_ENABLE_NEWSLETTER: ${NEXT_PUBLIC_ENABLE_NEWSLETTER:-false}
    image: sara-milan-frontend:latest
    container_name: sara-milan-frontend
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://host.docker.internal:8000/api/v1}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
      NEXT_PUBLIC_API_MODE: ${NEXT_PUBLIC_API_MODE:-real}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped
